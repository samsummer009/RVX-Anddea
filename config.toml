enable-magisk-update = true
parallel-jobs = 1
remove-rv-integrations-checks = false
# Use dev patches if they're latest, otherwise fall back to stable
patches-version = "dev"
cli-version = "latest"

# ReVanced Extended
[YouTube-RVX]
enabled = true
app-name = "YouTube"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.youtube"
patches-source = "anddea/revanced-patches"
integrations-source = "inotia00/revanced-integrations"
cli-source = "inotia00/revanced-cli"
rv-brand = "RVX"
build-mode = "both"
version = "auto"
#version = "latest"
#version = "20.25.35"
included-patches = "'Visual preferences icons' 'Return YouTube Username' 'Settings for YouTube' 'Theme' 'MaterialYou' 'Custom branding name for YouTube' 'GmsCore support'"
excluded-patches = "'Custom Shorts action buttons' 'Custom branding icon for YouTube'"
patcher-args = "-OdarkThemeBackgroundColor=@android:color/black -OinsertPosition=@string/about_key -OrvxSettingsLabel=ReVanced Extended -OappName=YouTube RVX -OpackageNameYouTube=com.google.android.youtube.rvx"



# ReVanced Extended
[YouTube-Monet-RVX]
enabled = true 
app-name = "YouTube-Monet"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.youtube"
patches-source = "anddea/revanced-patches"
integrations-source = "inotia00/revanced-integrations"
cli-source = "inotia00/revanced-cli"
rv-brand = "RVX"
build-mode = "both"
version = "auto"
#version = "latest"
#version = "20.25.35"
included-patches = "'Visual preferences icons' 'Return YouTube Username' 'Settings for YouTube' 'MaterialYou' 'Custom branding name for YouTube' 'GmsCore support'"
excluded-patches = "'Custom Shorts action buttons' 'Custom branding icon for YouTube' 'Theme'"
patcher-args = "-OinsertPosition=@string/about_key -OrvxSettingsLabel=ReVanced Extended -OappName=YouTube RVX -OpackageNameYouTube=com.google.android.youtube.rvx"



# ReVanced Extended
[YouTube-Music-RVX]
enabled = true
app-name = "YouTube-Music"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.apps.youtube.music"
patches-source = "anddea/revanced-patches"
integrations-source = "inotia00/revanced-integrations"
cli-source = "inotia00/revanced-cli"
rv-brand = "RVX"
#arch = "arm-v7a"
arch = "arm64-v8a"
#arch = "both"
build-mode = "both"
version = "auto"
#version = "latest"
#version = "8.33.53"
included-patches = "'Hide player overlay filter' 'Settings for YouTube Music' 'Custom branding name for YouTube Music' 'GmsCore support'"
excluded-patches = "'Custom branding icon for YouTube Music' 'Dark theme'"
patcher-args = "-OrvxSettingsLabel=ReVanced Extended -OappNameNotification=YouTube Music RVX -OappNameLauncher=YouTube Music RVX -OpackageNameYouTubeMusic=com.google.android.app.youtube.music.rvx"



