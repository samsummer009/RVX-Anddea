enable-module-update = true
parallel-jobs = 1
remove-rv-integrations-checks = false
compression-level = 9
# Use dev patches if they're latest, otherwise fall back to stable
patches-version = "dev"
cli-version = "dev"

# ReVanced Extended
[YouTube-RVX]
enabled = true
app-name = "YouTube"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.youtube"
patches-source = "anddea/revanced-patches"
integrations-source = "inotia00/revanced-integrations"
cli-source = "MorpheApp/morphe-cli"
rv-brand = "RVX"
build-mode = "both"
version = "auto"
#version = "latest"
#version = "20.23.40"
included-patches = "--ei=2 --ei=95 --ei=124 --ei=125 --ei=93 --ei=92 --ei=86"
excluded-patches = "--di=105 --di=89"
patcher-args = ""
patch-options = "'settings-label=ReVanced Extended' 'app-name=YouTube RVX' 'package-name=com.google.android.youtube.rvx'"

